server {
    listen 127.0.0.1:9443 ssl;
    server_name ollama.site-al.ru ollama.site-ai.ru;
    client_max_body_size 100m;

    ssl_certificate /etc/letsencrypt/live/ollama.site-al.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ollama.site-al.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /v1/ {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /chat {
        proxy_pass http://127.0.0.1:3011/chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /health {
        proxy_pass http://127.0.0.1:3011/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Студия: публичное превью по подписанному токену (path-based, см. lovable_plan §5.4)
    location /preview/ {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    location /api/ {
        client_max_body_size 12m;
        proxy_pass http://127.0.0.1:3011/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        root /var/www/ollama-web-react;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name ollama.site-al.ru ollama.site-ai.ru;
    client_max_body_size 100m;

    location /.well-known/acme-challenge/ {
        root /var/www/ollama.site-al.ru;
    }

    if ($host = ollama.site-al.ru) { return 301 https://$host$request_uri; }
    if ($host = ollama.site-ai.ru) { return 301 https://$host$request_uri; }

    return 404;
}
