<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ollama Chat</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7eef8;
      --muted: #8b9cb3;
      --user: #2563eb;
      --assistant: #334155;
      --error: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      font-size: 14px;
      color: var(--muted);
    }
    header strong { color: var(--text); }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    .msg {
      max-width: 100%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--assistant);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      font-size: 13px;
      color: var(--muted);
      background: transparent;
      border: 1px dashed var(--border);
    }
    .msg.error {
      color: var(--error);
      border-color: var(--error);
    }
    form {
      display: flex;
      gap: 8px;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    #input {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }
    #input:focus {
      outline: 2px solid #3b82f6;
      outline-offset: 0;
    }
    button {
      padding: 0 18px;
      border-radius: 10px;
      border: none;
      background: #3b82f6;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    button:not(:disabled):hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <header>
    API: <strong>POST /v1/chat/completions</strong> · модель <strong id="modelLabel"></strong>
  </header>
  <div id="chat" aria-live="polite"></div>
  <form id="form" autocomplete="off">
    <textarea id="input" rows="2" placeholder="Сообщение… (Enter — отправить, Shift+Enter — новая строка)" required></textarea>
    <button type="submit" id="send">Отправить</button>
  </form>

  <script>
    const API_KEY = 'key1';
    const MODEL = 'llama3:latest';

    /** История диалога для API (user / assistant) */
    let messages = [];

    const chatEl = document.getElementById('chat');
    const formEl = document.getElementById('form');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    document.getElementById('modelLabel').textContent = MODEL;

    function appendBubble(role, text, extraClass) {
      const div = document.createElement('div');
      div.className = 'msg ' + role + (extraClass ? ' ' + extraClass : '');
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function renderHistory() {
      chatEl.innerHTML = '';
      messages.forEach((m) => appendBubble(m.role, m.content));
    }

    function showError(text) {
      appendBubble('system', text, 'error');
    }

    async function sendMessage(userText) {
      messages.push({ role: 'user', content: userText });
      appendBubble('user', userText);

      sendBtn.disabled = true;
      inputEl.disabled = true;

      try {
        console.log('SEND TO API', '/v1/chat/completions');
        const res = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + API_KEY,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: MODEL,
            messages: messages,
            stream: false,
          }),
        }).catch((err) => {
          console.error('API ERROR', err);
          throw err;
        });

        const raw = await res.text();
        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error('Ответ не JSON: ' + raw.slice(0, 200));
        }

        if (!res.ok) {
          const msg =
            (data.error && data.error.message) ||
            data.message ||
            raw.slice(0, 300);
          throw new Error(msg || 'HTTP ' + res.status);
        }

        const content =
          data.choices &&
          data.choices[0] &&
          data.choices[0].message &&
          typeof data.choices[0].message.content === 'string'
            ? data.choices[0].message.content
            : '';

        messages.push({ role: 'assistant', content });
        appendBubble('assistant', content || '(пустой ответ)');
      } catch (e) {
        messages.pop();
        renderHistory();
        showError(e.message || String(e));
      } finally {
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    formEl.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      sendMessage(text);
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        formEl.requestSubmit();
      }
    });

    appendBubble(
      'system',
      'Откройте страницу через HTTPS-хост с разрешённым CORS или локально, если API отдаёт Access-Control-Allow-Origin. Ключ в коде только для теста.'
    );
  </script>
</body>
</html>
